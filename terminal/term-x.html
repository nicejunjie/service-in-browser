<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Terminal X — myhost</title>
<!--
  EXPERIMENTAL terminal — a separate app from the normal Terminal so it can't
  break it. It runs ONE dedicated terminal (slot 50) loaded with ?kbdexp=1,
  which (in the /tN/ sub_filter, see terminal/install.sh) enables Route 1: the
  injected script takes over xterm's textarea, so tapping the terminal raises
  the keyboard and dictation is buffered (diff-on-settle) instead of streamed
  char-by-char to the PTY. The "debug" button toggles an overlay in the iframe
  that prints the raw input/composition events for diagnosing dictation.
-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { display: flex; flex-direction: column; background: #1a1a2e; font-family: system-ui, sans-serif; }
  .bar {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 10px; background: #161b22; border-bottom: 1px solid #2a3040; flex-shrink: 0;
  }
  .bar .t { font-size: 13px; color: #9ab; font-weight: 600; }
  .bar .exp { font-size: 10px; color: #d2902a; border: 1px solid #6a5a30; border-radius: 4px; padding: 1px 6px; letter-spacing: .5px; }
  .bar .sp { flex: 1; }
  .bar button {
    font: 600 12px system-ui, sans-serif; cursor: pointer; border-radius: 6px;
    padding: 6px 12px; border: 1px solid #2d6cc0; background: rgba(45,108,192,.2); color: #cfe0f5;
  }
  .frames { flex: 1; position: relative; }
  iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; background: #2b2b2b; }
  .msg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #778; font-size: 14px; }
</style>
</head>
<body>
  <div class="bar">
    <span class="t">⬛ Terminal</span>
    <span class="exp">EXPERIMENTAL · dictation</span>
    <span class="sp"></span>
    <button id="dbg" title="Toggle the input-event debug overlay">debug</button>
  </div>
  <div class="frames" id="frames"><div class="msg" id="msg">starting…</div></div>
<script>
(function() {
  var N = 50, f = null;
  var frames = document.getElementById('frames');
  var msg = document.getElementById('msg');

  // ttyd may not be listening the instant /start returns; poll /tN/ first.
  function waitReady(cb) {
    var deadline = Date.now() + 20000;
    (function ping() {
      fetch('/t' + N + '/', { cache: 'no-store' }).then(function(r) {
        if (r.ok || Date.now() > deadline) cb(); else setTimeout(ping, 300);
      }).catch(function() {
        if (Date.now() > deadline) cb(); else setTimeout(ping, 300);
      });
    })();
  }

  fetch('/api/terminals/' + N + '/start', { method: 'POST' }).then(function() {
    waitReady(function() {
      f = document.createElement('iframe');
      f.allow = 'clipboard-read; clipboard-write';
      f.src = '/t' + N + '/?kbdexp=1';
      frames.appendChild(f);
      if (msg) msg.remove();
    });
  }).catch(function() { if (msg) msg.textContent = 'failed to start'; });

  document.getElementById('dbg').addEventListener('click', function() {
    if (f && f.contentWindow) { try { f.contentWindow.postMessage({ type: 'xdbg' }, '*'); } catch (e) {} }
  });
})();
</script>
</body>
</html>
