# claude-office: xpra HTML5 client at /office/ -> 127.0.0.1:@OFFICE_PORT@
# A second xpra desktop dedicated to LibreOffice (the Files app's "Edit"), so
# editing never hijacks the Browser desktop. Mirrors browser.conf.
# Drops in via the include in /etc/nginx/sites-available/claude-web.

location = /office  { return 301 /office/; }

# Short-circuit xpra's wallpaper jpeg (invisible under our pinned #screen).
location ~ ^/office/background\.(?:jpe?g|png)$ { return 204; }

# Static xpra client assets: cache + compress (xpra serves them uncompressed
# with no-store). Regex location takes precedence over the /office/ prefix; the
# WebSocket path has no file extension and falls through to /office/.
location ~ ^/office/(.+\.(?:js|css|wasm|woff2?|ttf|otf|eot|png|jpe?g|webp|svg|gif|ico|json|map|txt))$ {
    proxy_pass http://127.0.0.1:@OFFICE_PORT@/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Accept-Encoding "";
    proxy_hide_header Cache-Control;
    proxy_hide_header Pragma;
    proxy_hide_header Expires;
    add_header Cache-Control "public, max-age=86400" always;
    gzip on;
    gzip_proxied any;
    gzip_types text/javascript application/javascript application/x-javascript text/css application/json application/wasm image/svg+xml;
    gzip_min_length 256;
}

location /office/ {
    proxy_pass http://127.0.0.1:@OFFICE_PORT@/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;

    # Same CSS/JS injection as the Browser app (hide xpra UI, pin canvas, load
    # the shared touch-patches). xpra-patches.js is served from the web root.
    sub_filter_once on;
    sub_filter '</head>' '<style>#screen{position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;z-index:10!important}#float_menu,#login-overlay,#progress,.windowhead,.window-head,.window-title,.windowtitle,.title-bar{display:none!important}</style><script src="/xpra-patches.js?v10"></script></head>';
    proxy_set_header Accept-Encoding "";

    gzip on;
    gzip_proxied any;
    gzip_types text/html text/javascript application/javascript application/x-javascript text/css application/json;
    gzip_min_length 256;
}
